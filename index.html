<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIESEL — Zoelloe Markets</title>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║  DIESEL — Zoelloe Markets                           ║
  ║  Setup instructies:                                 ║
  ║                                                     ║
  ║  1. Ga naar https://console.firebase.google.com     ║
  ║  2. Maak een nieuw project aan (naam: diesel)       ║
  ║  3. Ga naar Authentication → Sign-in method         ║
  ║     → schakel "Email/Password" in                   ║
  ║  4. Ga naar Firestore Database → Create database    ║
  ║     → kies "Start in test mode"                     ║
  ║  5. Ga naar Project Settings → General              ║
  ║     → scroll naar "Your apps" → klik Web (</>)      ║
  ║     → kopieer de firebaseConfig waardes             ║
  ║  6. Plak ze hieronder in FIREBASE_CONFIG             ║
  ║  7. Ga naar Firestore → Rules, plak:               ║
  ║                                                     ║
  ║  rules_version = '2';                               ║
  ║  service cloud.firestore {                          ║
  ║    match /databases/{database}/documents {           ║
  ║      match /{document=**} {                         ║
  ║        allow read: if true;                         ║
  ║        allow write: if request.auth != null;        ║
  ║      }                                              ║
  ║    }                                                ║
  ║  }                                                  ║
  ║                                                     ║
  ║  8. Deploy: push dit bestand naar GitHub             ║
  ║     → Settings → Pages → main branch → Save        ║
  ╚══════════════════════════════════════════════════════╝
-->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',system-ui,sans-serif;
  background-color:#F5F3EF;
  color:#1a1a1a;min-height:100vh;
  background-repeat:repeat;background-size:320px 320px;
}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer}

/* ===== GEO BAR ===== */
.geo-bar{height:5px;display:flex}
.geo-bar span{flex:1}

/* ===== NAV ===== */
.nav{background:#fff;border-bottom:1px solid #e8e6e1}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:10px;height:54px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:8px}
.brand-name{font-family:'Futura','Century Gothic','Trebuchet MS',sans-serif;font-size:20px;font-weight:600;letter-spacing:.22em;color:#BA7517}
.brand-sub{font-size:10px;color:#888;letter-spacing:.06em;text-transform:uppercase}
.spacer{flex:1}
.tabs{display:flex;gap:0}
.tab{padding:0 16px;height:54px;border:none;background:none;font-size:12px;color:#888;border-bottom:2px solid transparent;letter-spacing:.03em;transition:color .15s,border-color .15s}
.tab:hover{color:#1a1a1a}
.tab.on{color:#BA7517;border-bottom-color:#BA7517;font-weight:600}
.user-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:11px;background:#fafafa;color:#1a1a1a}
.user-badge .uname{font-weight:600;color:#BA7517}
.logout-btn{background:none;border:none;color:#aaa;font-size:10px;padding:2px 4px;transition:color .15s}
.logout-btn:hover{color:#A32D2D}

/* ===== CONTENT ===== */
.content{max-width:1080px;margin:0 auto;padding:1.5rem 1rem 3rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.section-title{font-size:16px;font-weight:600}
.section-meta{font-size:12px;color:#888}

/* ===== CHIPS ===== */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.chip{padding:4px 12px;border-radius:99px;border:1px solid #ddd;background:#fff;font-size:11px;color:#888;transition:all .15s}
.chip:hover{border-color:#BA7517;color:#633806}
.chip.on{background:#FAEEDA;border-color:#BA7517;color:#633806;font-weight:500}

/* ===== MARKET CARDS ===== */
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.market-card{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.market-card:hover{border-color:#BA7517;box-shadow:0 2px 12px rgba(186,117,23,.08)}
.mcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.badge{font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
.b-utrecht{background:#E1F5EE;color:#085041}
.b-nederland{background:#E6F1FB;color:#0C447C}
.b-ons-leven{background:#FAEEDA;color:#633806}
.b-de-wereld{background:#FAECE7;color:#712B13}
.b-sport{background:#EAF3DE;color:#27500A}
.b-overig{background:#F1EFE8;color:#444441}
.b-resolved{background:#E8E8E8;color:#555}
.mcard-closing{font-size:10px;color:#aaa}
.mcard-title{font-family:Georgia,'Times New Roman',serif;font-size:14px;line-height:1.45;margin-bottom:12px}
.prob-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.prob-label{font-size:10px;font-weight:600;width:28px}
.prob-label.yes{color:#3B6D11}.prob-label.no{color:#A32D2D}
.prob-track{flex:1;height:5px;background:#f0eeea;border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px;transition:width .3s}
.prob-fill.yes{background:#639922}.prob-fill.no{background:#E24B4A}
.prob-pct{font-size:10px;width:30px;text-align:right;color:#888}
.mcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #f0eeea}
.pot{font-size:11px;color:#888}.pot-val{font-weight:600;color:#BA7517}
.bet-count{font-size:10px;color:#aaa}

/* ===== DETAIL ===== */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#888;margin-bottom:1rem;background:none;border:none;padding:0;transition:color .15s}
.back-btn:hover{color:#1a1a1a}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start}
.detail-card{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:1.25rem}
.detail-title{font-family:Georgia,'Times New Roman',serif;font-size:20px;line-height:1.35;margin:10px 0 12px}
.detail-desc{font-size:13px;color:#666;line-height:1.65;margin-bottom:1.25rem}
.detail-creator{font-size:11px;color:#aaa;margin-bottom:8px}
.big-prob-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.big-prob-label{font-size:13px;font-weight:600;width:34px}
.big-prob-label.yes{color:#3B6D11}.big-prob-label.no{color:#A32D2D}
.big-prob-track{flex:1;height:10px;background:#f0eeea;border-radius:5px;overflow:hidden}
.big-prob-fill{height:100%;border-radius:5px;transition:width .3s}
.big-prob-fill.yes{background:#639922}.big-prob-fill.no{background:#E24B4A}
.big-prob-pct{font-size:14px;font-weight:600;width:40px;text-align:right}
.big-prob-pct.yes{color:#3B6D11}.big-prob-pct.no{color:#A32D2D}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1.25rem 0}
.stat-item{background:#faf9f6;border-radius:8px;padding:12px;text-align:center}
.stat-label{font-size:10px;color:#888;margin-bottom:4px}
.stat-value{font-size:15px;font-weight:600}.stat-value.dd{color:#BA7517}
.outcome-banner{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:600;text-align:center}
.outcome-banner.yes{background:#EAF3DE;color:#3B6D11;border:1px solid #c5dea6}
.outcome-banner.no{background:#FCEBEB;color:#A32D2D;border:1px solid #f0b5b5}

/* ===== BET FORM ===== */
.bet-card{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:1.25rem;position:sticky;top:1rem}
.bet-title{font-size:13px;font-weight:600;margin-bottom:12px}
.sides-row{display:flex;gap:8px;margin-bottom:14px}
.side-btn{flex:1;padding:8px;border-radius:6px;border:1px solid #ddd;background:none;font-size:12px;font-weight:600;transition:all .15s}
.side-btn.yes{border-color:#93bb6a;color:#3B6D11}
.side-btn.yes.on{background:#EAF3DE;border-color:#3B6D11}
.side-btn.no{border-color:#e89999;color:#A32D2D}
.side-btn.no.on{background:#FCEBEB;border-color:#A32D2D}
.input-label{font-size:11px;color:#888;margin-bottom:4px}
.bet-input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;margin-bottom:12px}
.bet-input:focus{outline:none;border-color:#BA7517}
.bet-submit{width:100%;padding:10px;border:none;border-radius:6px;background:#BA7517;color:white;font-size:12px;font-weight:600;letter-spacing:.03em;transition:background .15s}
.bet-submit:hover{background:#995f10}
.bet-submit:disabled{background:#ccc;cursor:not-allowed}
.balance-info{font-size:10px;color:#888;text-align:center;margin-top:8px}
.balance-info b{color:#BA7517}
.bet-message{font-size:11px;text-align:center;margin-top:8px;padding:6px;border-radius:4px}
.bet-message.success{color:#3B6D11;background:#EAF3DE}
.bet-message.error{color:#A32D2D;background:#FCEBEB}
.admin-section{margin-top:14px;padding-top:14px;border-top:1px solid #f0eeea}
.admin-title{font-size:10px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.admin-row{display:flex;gap:8px}
.resolve-btn{flex:1;padding:8px;border-radius:6px;border:1px solid;background:none;font-size:11px;font-weight:600;transition:all .15s}
.resolve-btn.yes{border-color:#3B6D11;color:#3B6D11}.resolve-btn.yes:hover{background:#EAF3DE}
.resolve-btn.no{border-color:#A32D2D;color:#A32D2D}.resolve-btn.no:hover{background:#FCEBEB}

/* ===== BETS LIST ===== */
.bets-list{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:1rem 1.1rem;margin-top:14px}
.bets-list-header{font-size:12px;font-weight:600;margin-bottom:12px}
.bet-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0eeea}
.bet-row:last-child{border-bottom:none}
.bet-left{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
.bet-name{font-size:12px}
.side-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:99px}
.side-tag.yes{background:#EAF3DE;color:#3B6D11}.side-tag.no{background:#FCEBEB;color:#A32D2D}
.bet-amount{font-size:12px;font-weight:600;color:#BA7517}

/* ===== LEADERBOARD ===== */
.lb-card{background:#fff;border:1px solid #e8e6e1;border-radius:10px;overflow:hidden}
.lb-row{display:flex;align-items:center;gap:12px;padding:.85rem 1.1rem;border-bottom:1px solid #f0eeea}
.lb-row:last-child{border-bottom:none}
.lb-row.first{background:#FFFCF5}
.lb-rank{font-size:12px;font-weight:600;width:24px;text-align:center;color:#888}
.lb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-inactive{opacity:.45}
.lb-right{text-align:right}
.lb-balance{font-size:13px;font-weight:600;color:#BA7517}
.lb-pnl{font-size:10px}
.lb-pnl.pos{color:#3B6D11}.lb-pnl.neg{color:#A32D2D}.lb-pnl.zero{color:#888}
.lb-status{font-size:9px;color:#bbb;font-style:italic}

/* ===== CREATE FORM ===== */
.create-form{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:1.5rem;max-width:560px}
.form-group{margin-bottom:14px}
.form-group label{font-size:11px;color:#888;margin-bottom:4px;display:block}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#BA7517}
.form-group textarea{resize:vertical;min-height:80px}
.form-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{padding:8px 18px;border:1px solid #ddd;border-radius:6px;background:none;font-size:12px;color:#888;transition:all .15s}
.btn-cancel:hover{border-color:#999;color:#1a1a1a}
.btn-submit{padding:8px 18px;border:none;border-radius:6px;background:#BA7517;color:white;font-size:12px;font-weight:600;transition:background .15s}
.btn-submit:hover{background:#995f10}

/* ===== AUTH SCREEN ===== */
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:#fff;border:1px solid #e8e6e1;border-radius:12px;padding:2rem 2.5rem;text-align:center;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.05)}
.auth-brand{font-family:'Futura','Century Gothic','Trebuchet MS',sans-serif;font-size:32px;font-weight:700;letter-spacing:.25em;color:#BA7517;margin-bottom:4px}
.auth-sub{font-size:12px;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1.5rem}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-bottom:1px solid #e8e6e1}
.auth-tab{flex:1;padding:10px;border:none;background:none;font-size:12px;color:#888;border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.auth-tab.on{color:#BA7517;border-bottom-color:#BA7517}
.auth-input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;margin-bottom:10px}
.auth-input:focus{outline:none;border-color:#BA7517}
.auth-select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;margin-bottom:10px}
.auth-select:focus{outline:none;border-color:#BA7517}
.auth-btn{width:100%;padding:12px;border:none;border-radius:8px;background:#BA7517;color:white;font-size:14px;font-weight:600;letter-spacing:.03em;transition:background .15s;margin-top:6px}
.auth-btn:hover{background:#995f10}
.auth-btn:disabled{background:#ccc;cursor:not-allowed}
.auth-error{font-size:11px;color:#A32D2D;background:#FCEBEB;padding:8px;border-radius:6px;margin-bottom:10px}
.auth-footer{font-size:10px;color:#bbb;margin-top:1.5rem;line-height:1.6}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-card{background:#fff;border-radius:12px;padding:1.5rem;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:8px}
.modal-text{font-size:13px;color:#666;margin-bottom:1.25rem;line-height:1.5}
.modal-buttons{display:flex;gap:8px;justify-content:center}
.modal-btn{padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s;border:none}
.modal-btn.cancel{background:#f5f5f5;color:#888}.modal-btn.cancel:hover{background:#eee}
.modal-btn.confirm-yes{background:#3B6D11;color:white}
.modal-btn.confirm-no{background:#A32D2D;color:white}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:3rem 1rem;color:#888}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.empty-text{font-size:13px;line-height:1.5}

/* ===== LOADING ===== */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.loading-text{font-family:'Futura','Century Gothic','Trebuchet MS',sans-serif;font-size:22px;color:#BA7517;letter-spacing:.15em;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== LIVE DOT ===== */
.live-dot{width:6px;height:6px;border-radius:50%;background:#3B6D11;display:inline-block;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ═════════════════════════════════════════════════════
   TIJDLIJN (Berichten)
   ═════════════════════════════════════════════════════ */
.timeline-wrap{max-width:640px;margin:0 auto}
.post-box{background:#fff;border:1px solid #e8e6e1;border-radius:12px;padding:14px;margin-bottom:16px}
.post-box-top{display:flex;gap:10px;align-items:flex-start}
.post-box textarea{flex:1;border:none;resize:none;font-family:inherit;font-size:14px;min-height:48px;outline:none;background:transparent;line-height:1.45}
.post-box-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f0eeea}
.post-counter{font-size:11px;color:#aaa}
.post-counter.over{color:#A32D2D}
.post-btn{padding:8px 18px;border:none;border-radius:99px;background:#BA7517;color:#fff;font-size:12px;font-weight:600;letter-spacing:.03em;transition:background .15s}
.post-btn:hover{background:#995f10}
.post-btn:disabled{background:#ddd;cursor:not-allowed}
.tweet{background:#fff;border:1px solid #e8e6e1;border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.tweet:hover{border-color:#e0d8c8}
.tweet-head{display:flex;gap:10px;align-items:flex-start}
.tweet-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.tweet-body{flex:1;min-width:0}
.tweet-meta{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.tweet-name{font-size:13px;font-weight:600;color:#1a1a1a}
.tweet-time{font-size:11px;color:#aaa}
.tweet-text{font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;margin-top:2px;color:#222}
.tweet-actions{display:flex;gap:18px;margin-top:10px;padding-top:8px;border-top:1px solid #f5f3ee}
.tweet-action{background:none;border:none;padding:0;font-size:11px;color:#aaa;display:flex;align-items:center;gap:5px;transition:color .15s}
.tweet-action:hover{color:#BA7517}
.tweet-action.liked{color:#A32D2D}
.tweet-action.liked:hover{color:#7a1f1f}
.tweet-action.del:hover{color:#A32D2D}
.reply-box{margin-top:10px;padding:10px;background:#faf9f6;border-radius:8px}
.reply-box textarea{width:100%;border:1px solid #e8e6e1;border-radius:6px;padding:6px 10px;font-family:inherit;font-size:13px;min-height:36px;resize:vertical;outline:none}
.reply-box textarea:focus{border-color:#BA7517}
.reply-box-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:6px}
.reply-box-actions button{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.reply-box-actions .cancel{background:#f0eeea;color:#888}
.reply-box-actions .send{background:#BA7517;color:#fff}
.replies{margin-top:10px;padding-left:22px;border-left:2px solid #f0eeea}
.reply{padding:8px 0;border-bottom:1px solid #f5f3ee}
.reply:last-child{border-bottom:none}

/* ═════════════════════════════════════════════════════
   SCORITO
   ═════════════════════════════════════════════════════ */
.sc-subtabs{display:flex;gap:4px;background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sc-subtab{flex:1;min-width:92px;padding:8px 10px;border:none;border-radius:7px;background:none;font-size:12px;color:#888;font-weight:500;transition:all .15s;white-space:nowrap}
.sc-subtab:hover{color:#1a1a1a}
.sc-subtab.on{background:#FAEEDA;color:#633806;font-weight:600}
.sc-score-pill{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#BA7517,#993C1D);color:#fff;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600}
.sc-phase-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.sc-phase-chip{padding:6px 12px;border-radius:99px;border:1px solid #ddd;background:#fff;font-size:11px;color:#666;font-weight:500;transition:all .15s}
.sc-phase-chip.on{background:#BA7517;border-color:#BA7517;color:#fff}
.sc-phase-chip.locked{opacity:.6}
.sc-phase-chip .lock{font-size:9px;margin-left:3px}

function fmt(n) { return Math.round(n).toLocaleString('nl-NL'); }

function avtColor(name) { let h=0; for(let i=0;i<(name||'').length;i++) h=name.charCodeAt(i)+((h<<5)-h); const idx=Math.abs(h)%AVT_BG.length; return {bg:AVT_BG[idx],fg:AVT_FG[idx]}; }
function esc(s) { const el=document.createElement('div'); el.textContent=s; return el.innerHTML; }
function fmtDate(ds) {
  if(!ds) return '';
  const months=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  const d=new Date(ds+'T00:00:00'); if(isNaN(d)) return ds;
  return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}
function todayStr() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function geoHtml() { return '<div class="geo-bar">'+GEO.map(c=>'<span style="background:'+c+'"></span>').join('')+'</div>'; }
function marketStats(m) {
  const mb = allBets.filter(b => b.market_id === m.id);
  const yT = mb.filter(b=>b.side==='yes').reduce((s,b)=>s+b.amount,0);
  const nT = mb.filter(b=>b.side==='no').reduce((s,b)=>s+b.amount,0);
  const pot = yT+nT;
  const yP = pot>0 ? Math.round(yT/pot*100) : 50;
  return { ...m, yes_total:yT, no_total:nT, total_pot:pot, yes_pct:yP, no_pct:100-yP, bet_count:mb.length, bets:mb };
}

// Controleer of een fase deadline verstreken is
function scPhaseLocked(phaseId) {
  if (!scTournament) return false;
  const dl = scTournament.deadlines?.[phaseId];
  if (!dl) return false;
  return new Date() > new Date(dl);
}

// Formatteer datum/tijd voor weergave
function scFmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${dd}-${mm} ${hh}:${mi}`;
}
function scFmtRelDeadline(iso) {
  if (!iso) return 'Geen deadline';
  const d = new Date(iso);
  const diff = d - new Date();
  if (diff < 0) return 'Deadline verlopen';
  const h = Math.floor(diff/3600000);
  if (h < 1) return Math.floor(diff/60000)+' min over';
  if (h < 24) return h+' uur over';
  return Math.floor(h/24)+' dagen over';
}

// Punten voor een wedstrijdvoorspelling
function scMatchPoints(pred, match) {
  if (!pred || !match || match.status !== 'finished') return null;
  if (match.score_home == null || match.score_away == null) return null;
  if (pred.pred_home == null || pred.pred_away == null) return null;
  const phase = scPhase(match.phase);
  if (!phase) return null;
  const actualWinner = match.score_home > match.score_away ? 'H' : match.score_home < match.score_away ? 'A' : 'D';
  const predWinner = pred.pred_home > pred.pred_away ? 'H' : pred.pred_home < pred.pred_away ? 'A' : 'D';
  if (pred.pred_home === match.score_home && pred.pred_away === match.score_away) {
    return { pts: phase.exact, type:'exact' };
  }
  if (actualWinner === predWinner) {
    return { pts: phase.toto, type:'toto' };
  }
  return { pts: 0, type:'none' };
}

// Totale punten van een user voor wedstrijdvoorspellingen
function scUserMatchPoints(uid) {
  let total = 0;
  const myPreds = scPredictions.filter(p => p.user_uid === uid);
  for (const p of myPreds) {
    const m = scMatches.find(x => x.id === p.match_id);
    if (!m || m.status !== 'finished') continue;
    const r = scMatchPoints(p, m);
    if (r) total += r.pts;
  }
  return total;
}

// Totale punten voor topscorer-picks
function scUserTopscorerPoints(uid) {
  let total = 0;
  const picks = scTopscorerPicks.filter(p => p.user_uid === uid);
  for (const pick of picks) {
    const phase = scPhase(pick.phase);
    if (!phase) continue;
    for (const playerId of (pick.player_ids || [])) {
      const player = scPlayers.find(p => p.id === playerId);
      if (!player) continue;
      // Doelpunten gescoord in deze fase
      const goalsThisPhase = player.goals_by_phase?.[pick.phase] || 0;
      const ptsPerGoal = phase.scorer[player.pos] || 0;
      total += goalsThisPhase * ptsPerGoal;
    }
  }
  return total;
}

// Totale punten voor land-voorspellingen
function scUserCountryPoints(uid) {
  const pred = scCountryPreds.find(p => p.user_uid === uid);
  if (!pred || !scTournament) return 0;
  let total = 0;
  const results = scTournament.country_results || {};

  // Groepsfase: door / juiste positie
  if (pred.groups) {
    for (const [code, info] of Object.entries(pred.groups)) {
      const actual = results[code];
      if (!actual) continue;
      if (info.through && actual.through_group) {
        total += SC_COUNTRY_POINTS.throughGroup;
        if (info.position && actual.group_position && info.position === actual.group_position) {
          total += SC_COUNTRY_POINTS.correctGroupPos;
        }
      }
    }
  }
  // KO rondes
  const rounds = [
    ['to_qf',    SC_COUNTRY_POINTS.toQF],
    ['to_sf',    SC_COUNTRY_POINTS.toSF],
    ['to_final', SC_COUNTRY_POINTS.toFinal]
  ];
  for (const [key, pts] of rounds) {
    const picked = pred[key] || [];
    const actual = scTournament[key] || [];
    for (const code of picked) {
      if (actual.includes(code)) total += pts;
    }
  }
  // Kampioen
  if (pred.champion && scTournament.champion && pred.champion === scTournament.champion) {
    total += SC_COUNTRY_POINTS.champion;
  }
  return total;
}

function scUserTotalPoints(uid) {
  return scUserMatchPoints(uid) + scUserTopscorerPoints(uid) + scUserCountryPoints(uid);
}

function scMatchesForPhase(phaseId) {
  return scMatches.filter(m => m.phase === phaseId).sort((a,b) => (a.kickoff||'').localeCompare(b.kickoff||''));
}

function scMyPrediction(matchId) {

function scMyTopscorerPick(phaseId) {
  if (!currentUser) return null;

}

function scMyCountryPred() {
  if (!currentUser) return null;
  return scCountryPreds.find(p => p.user_uid === currentUser.uid) || null;
}

auth.onAuthStateChanged(async (firebaseUser) => {
  if (firebaseUser) {
    try {
      const doc = await db.collection('users').doc(firebaseUser.uid).get();
      if (doc.exists) {
        currentUser = { uid: firebaseUser.uid, ...doc.data() };
        startListeners();
        // Seed scorito data éénmalig voor bestaande gebruikers (non-blocking)
        seedScoritoIfNeeded().catch(e => console.log('seedScorito:', e?.message||e));
      } else {
        await auth.signOut();
        currentUser = null;
      }
    } catch(e) {
      console.error('Profile load error:', e);
      currentUser = null;
    }
  } else {
    currentUser = null;
    stopListeners();
  }
  authLoaded = true;
  render();
});

async function doRegister() {
  if (authBusy) return;
  const name = document.getElementById('regName')?.value;
  const email = document.getElementById('regEmail')?.value?.trim();
  const pw = document.getElementById('regPw')?.value;
  if (!name || !email || !pw) { authError = 'Vul alle velden in.'; render(); return; }
  if (pw.length < 6) { authError = 'Wachtwoord moet minimaal 6 tekens zijn.'; render(); return; }

  authBusy = true; authError = ''; render();
  try {
    // Check name not already claimed (before creating auth account)
    const existing = await db.collection('users').where('name','==',name).get();
    if (!existing.empty) {
      throw new Error('naam-al-geclaimd');
    }
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, balance: START_BALANCE, created_at: new Date().toISOString()
    });
    await seedMarketsIfNeeded();
  } catch(e) {
    authBusy = false;
    if (e.message === 'naam-al-geclaimd') {
      authError = 'Deze naam is al geclaimd door iemand anders!';
    } else {
      authError = firebaseErrorNL(e);
    }
    render();
  }
  // Succes: onAuthStateChanged handelt render af
  authBusy = false;
}

async function doLogin() {
  if (authBusy) return;
  const email = document.getElementById('loginEmail')?.value?.trim();
  const pw = document.getElementById('loginPw')?.value;
  if (!email || !pw) { authError = 'Vul e-mail en wachtwoord in.'; render(); return; }

  authBusy = true; authError = ''; render();
  try {
    await auth.signInWithEmailAndPassword(email, pw);
    // Succes: onAuthStateChanged handelt render af zodra profiel geladen is
    authBusy = false;
  } catch(e) {
    authBusy = false;
    authError = firebaseErrorNL(e);
    render();
  }
}

async function doLogout() {
  authBusy = false;
  authError = '';
  stopListeners();
  await auth.signOut();
  currentUser = null;
  view = 'markten';
  render();
}

function firebaseErrorNL(e) {
  const msg = e?.code || e?.message || String(e);
  if (msg.includes('email-already-in-use')) return 'Dit e-mailadres is al in gebruik.';
  if (msg.includes('invalid-email')) return 'Ongeldig e-mailadres.';
  if (msg.includes('weak-password')) return 'Wachtwoord is te zwak (minimaal 6 tekens).';
  if (msg.includes('wrong-password') || msg.includes('invalid-credential')) return 'Onjuist e-mailadres of wachtwoord.';
  if (msg.includes('user-not-found')) return 'Geen account gevonden met dit e-mailadres.';
  if (msg.includes('too-many-requests')) return 'Te veel pogingen. Probeer het later opnieuw.';
  return e?.message || 'Er ging iets mis. Probeer het opnieuw.';
}

/* ═══════════════════════════════════════════════════
   FIRESTORE LISTENERS (real-time)
   ═══════════════════════════════════════════════════ */
function startListeners() {
  stopListeners();
  unsubs.push(db.collection('users').onSnapshot(snap => {
    allUsers = snap.docs.map(d => ({ uid:d.id, ...d.data() }));
    // Also update currentUser balance
    if (currentUser) {
      const me = allUsers.find(u => u.uid === currentUser.uid);
      if (me) currentUser.balance = me.balance;
    }
    render();
  }));
  unsubs.push(db.collection('markets').orderBy('created_at','desc').onSnapshot(snap => {
    markets = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    // Auto-close past closing date
    const today = todayStr();
    markets.forEach(m => {
      if (m.status === 'open' && m.closing_date < today) {
        db.collection('markets').doc(m.id).update({ status:'closed' });
      }
    });
    render();
  }));
  unsubs.push(db.collection('bets').onSnapshot(snap => {
    allBets = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));

  // Tijdlijn berichten
  unsubs.push(db.collection('messages').orderBy('created_at','desc').onSnapshot(snap => {
    messages = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));

  // Scorito listeners
  unsubs.push(db.collection('sc_matches').onSnapshot(snap => {
    scMatches = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));
  unsubs.push(db.collection('sc_players').onSnapshot(snap => {
    scPlayers = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));
  unsubs.push(db.collection('sc_predictions').onSnapshot(snap => {
    scPredictions = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));
  unsubs.push(db.collection('sc_topscorer_picks').onSnapshot(snap => {
    scTopscorerPicks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));
  unsubs.push(db.collection('sc_country_predictions').onSnapshot(snap => {
    scCountryPreds = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }));
  unsubs.push(db.collection('sc_config').doc('tournament').onSnapshot(doc => {
    scTournament = doc.exists ? doc.data() : null;
    render();
  }));
}

function stopListeners() {
  unsubs.forEach(fn => fn());
  unsubs = [];
}

/* ═══════════════════════════════════════════════════
   SCORITO SEED
   ═══════════════════════════════════════════════════ */
async function seedScoritoIfNeeded() {
  try {
    const configDoc = await db.collection('sc_config').doc('seed').get();
    if (configDoc.exists && configDoc.data().done) return;

    const batch = db.batch();

    // Seed spelers
    for (const p of SC_PLAYERS_SEED) {
      const ref = db.collection('sc_players').doc(p.id);
      batch.set(ref, {
        name: p.name,
        team: p.team,
        pos: p.pos,
        goals_by_phase: { group:0, r16:0, qf:0, sf:0, '3rd':0, final:0 }
      });
    }

    // Seed wedstrijden (36 groepswedstrijden, 12 groepen × 6 wedstrijden per groep)
    // Voor WK 2026: elke groep speelt 6 wedstrijden (iedereen tegen iedereen in groep van 4)
    const baseDate = new Date('2026-06-11T18:00:00');
    let matchIdx = 0;
    for (const [group, teams] of Object.entries(SC_GROUPS)) {
      // 6 wedstrijden per groep: 1v2, 3v4, 1v3, 2v4, 1v4, 2v3
      const pairings = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
      for (const [i,j] of pairings) {
        const kickoff = new Date(baseDate.getTime() + matchIdx * 3 * 3600 * 1000);
        const ref = db.collection('sc_matches').doc();
        batch.set(ref, {
          phase: 'group',
          group: group,
          team_home: teams[i],
          team_away: teams[j],
          kickoff: kickoff.toISOString(),
          status: 'scheduled',
          score_home: null,
          score_away: null
        });
        matchIdx++;
      }
    }

    // Initialiseer toernooi-state met deadlines
    batch.set(db.collection('sc_config').doc('tournament'), {
      name: 'WK 2026',
      current_phase: 'group',
      deadlines: {
        group:  '2026-06-11T18:00:00',
        r16:    '2026-07-04T18:00:00',
        qf:     '2026-07-09T18:00:00',
        sf:     '2026-07-14T18:00:00',
        '3rd':  '2026-07-18T18:00:00',
        final:  '2026-07-19T18:00:00'
      },
      countries_deadline: '2026-06-11T18:00:00',  // voorspelling landen sluit bij start toernooi
      country_results: {},  // { [code]: { through_group, group_position } }
      to_qf: [],
      to_sf: [],
      to_final: [],
      champion: null
    });

    batch.set(db.collection('sc_config').doc('seed'), { done: true, at: new Date().toISOString() });
    await batch.commit();
    console.log('Scorito seed: done');
  } catch(e) {
    console.log('Scorito seed error:', e.message);
  }
}

async function doBet() {

  const amount = parseInt(input?.value);
  if (!amount || amount < 1) { betMsg={type:'error',text:'Voer een geldig bedrag in.'}; render(); return; }
  if (amount > currentUser.balance) { betMsg={type:'error',text:'Je tank is leeg! Niet genoeg '+CURRENCY+' op je saldo. ⛽'}; render(); return; }

  try {
    const batch = db.batch();

      user_uid: currentUser.uid,
      user_name: currentUser.name,
      side: betSide,
      amount: amount,
      created_at: new Date().toISOString(),
    });
    batch.update(db.collection('users').doc(currentUser.uid), {

    });
    await batch.commit();
    betMsg = {type:'success', text: fmt(amount)+' '+CURRENCY+' ingezet op '+(betSide==='yes'?'JA':'NEE')+'!'};
  } catch(e) {

  }

}

async function doResolve(outcome) {
  document.querySelector('.modal-overlay')?.remove();
  const market = markets.find(m => m.id === selectedMarketId);
  if (!market || market.status === 'resolved') return;

  const mb = allBets.filter(b => b.market_id === selectedMarketId);
  const yT = mb.filter(b=>b.side==='yes').reduce((s,b)=>s+b.amount,0);
  const nT = mb.filter(b=>b.side==='no').reduce((s,b)=>s+b.amount,0);
  const pot = yT + nT;
  const winTotal = outcome === 'yes' ? yT : nT;

  try {
    const batch = db.batch();
    if (pot > 0) {
      if (winTotal > 0) {
        mb.filter(b=>b.side===outcome).forEach(b => {
          const share = (b.amount / winTotal) * pot;
          batch.update(db.collection('users').doc(b.user_uid), {
            balance: firebase.firestore.FieldValue.increment(share)
          });
        });
      } else {
        mb.forEach(b => {
          batch.update(db.collection('users').doc(b.user_uid), {
            balance: firebase.firestore.FieldValue.increment(b.amount)
          });
        });
      }
    }
    batch.update(db.collection('markets').doc(selectedMarketId), { status:'resolved', outcome });
    await batch.commit();
    betMsg = null;
  } catch(e) {
    betMsg = {type:'error', text:'Fout bij resolveren: '+e.message};
  }
  render();
}

function fmtRelTime(iso) {
  const diff = new Date() - new Date(iso);
  if (diff < 60000) return 'zojuist';
  if (diff < 3600000) return Math.floor(diff/60000)+'m';
  if (diff < 86400000) return Math.floor(diff/3600000)+'u';
  if (diff < 604800000) return Math.floor(diff/86400000)+'d';
  return fmtDate(iso.slice(0,10));
}

   SCORITO ACTIES
   ═══════════════════════════════════════════════════ */
async function doSavePredictions(phaseId) {
  if (scPhaseLocked(phaseId)) {
    scoritoMsg = { type:'error', text:'Deadline voor deze ronde is al verlopen.' };
    render();
    return;
  }
  const matchesInPhase = scMatchesForPhase(phaseId);
  const batch = db.batch();
  let savedCount = 0;
  let hasErrors = false;

  for (const m of matchesInPhase) {
    const draft = scDraftPredictions[m.id];
    if (!draft) continue;
    const h = parseInt(draft.home);
    const a = parseInt(draft.away);
    if (isNaN(h) || isNaN(a) || h < 0 || a < 0) { hasErrors = true; continue; }

    // Zoek bestaande voorspelling
    const existing = scPredictions.find(p => p.user_uid === currentUser.uid && p.match_id === m.id);
    const data = {
      user_uid: currentUser.uid,
      user_name: currentUser.name,
      match_id: m.id,
      pred_home: h,
      pred_away: a,
      phase: phaseId,
      submitted_at: new Date().toISOString()
    };
    if (existing) {
      batch.update(db.collection('sc_predictions').doc(existing.id), data);
    } else {
      batch.set(db.collection('sc_predictions').doc(), data);
    }
    savedCount++;
  }

  if (savedCount === 0) {
    scoritoMsg = { type:'error', text:'Niks om op te slaan. Vul eerst scores in.' };
    render();
    return;
  }

  try {
    await batch.commit();
    scDraftPredictions = {};
    scClearUnsaved('matches');
    scoritoMsg = { type:'success', text: savedCount+' voorspelling'+(savedCount>1?'en':'')+' opgeslagen!' + (hasErrors?' (Sommige overgeslagen)':'') };
  } catch(e) {
    scoritoMsg = { type:'error', text:'Fout: '+e.message };
  }
  render();
}

async function doSaveCountryPredictions() {
  const dl = scTournament?.countries_deadline;
  if (dl && new Date() > new Date(dl)) {
    scoritoMsg = { type:'error', text:'Deadline voor landen-voorspelling is verlopen.' };
    render();
    return;
  }
  if (!scDraftCountry) {
    scoritoMsg = { type:'error', text:'Niks om op te slaan. Vul eerst iets in.' };
    render();
    return;
  }
  // Niks is verplicht - sla op wat de gebruiker heeft ingevuld.
  // Check of er überhaupt iets ingevuld is:
  const hasGroups = scDraftCountry.groups && Object.values(scDraftCountry.groups).some(g => g && (g.through || g.position));
  const hasKo = (scDraftCountry.to_qf?.length || scDraftCountry.to_sf?.length || scDraftCountry.to_final?.length);
  const hasChamp = !!scDraftCountry.champion;
  if (!hasGroups && !hasKo && !hasChamp) {
    scoritoMsg = { type:'error', text:'Vul eerst iets in voordat je opslaat.' };
    render();
    return;
  }
  try {
    const existing = scMyCountryPred();
    const data = {
      user_uid: currentUser.uid,
      user_name: currentUser.name,
      groups: scDraftCountry.groups || {},
      to_qf: scDraftCountry.to_qf || [],
      to_sf: scDraftCountry.to_sf || [],
      to_final: scDraftCountry.to_final || [],
      champion: scDraftCountry.champion || null,
      submitted_at: new Date().toISOString()
    };
    if (existing) {
      await db.collection('sc_country_predictions').doc(existing.id).update(data);

      await db.collection('sc_country_predictions').add(data);
    }
    scClearUnsaved('country');
    scoritoMsg = { type:'success', text:'Landenvoorspelling opgeslagen!' };

function renderMarkets() {
  const enriched = markets.map(m => marketStats(m));
  const filtered = catFilter ? enriched.filter(m=>m.category===catFilter) : enriched;
  const openCount = enriched.filter(m=>m.status==='open').length;

  const chipsHtml = '<div class="chips">' +
    '<button class="chip '+(catFilter===''?'on':'')+'" onclick="setCatFilter(\'\')">Alles</button>' +
    CATEGORIES.map(c=>'<button class="chip '+(catFilter===c?'on':'')+'" onclick="setCatFilter(\''+c+'\')">'+c+'</button>').join('') +
    '</div>';

  if (filtered.length === 0) {
    return `<div class="section-header"><span class="section-title">Markten</span><span class="section-meta"><span class="live-dot"></span>${openCount} open</span></div>`+chipsHtml+
      '<div class="empty-state"><div class="empty-icon">⛽</div><div class="empty-title">Nog geen weddenschappen</div><div class="empty-text">De tank is leeg! Maak de eerste weddenschap aan<br>en laat de Zoelloe-voorspellingen beginnen.</div></div>';
  }

  const cardsHtml = filtered.map(m => {
    const statusLabel = m.status==='resolved' ? (m.outcome==='yes'?'JA ✓':'NEE ✗') : m.status==='closed' ? 'Gesloten' : 'Sluit '+fmtDate(m.closing_date);
    const badgeCls = m.status==='resolved' ? 'b-resolved' : (CAT_CLASS[m.category]||'b-overig');
    const badgeText = m.status==='resolved' ? (m.outcome==='yes'?'✓ JA':'✗ NEE') : m.category;
    return `<div class="market-card" onclick="openMarket('${m.id}')">
      <div class="mcard-top"><span class="badge ${badgeCls}">${badgeText}</span><span class="mcard-closing">${statusLabel}</span></div>
      <div class="mcard-title">${esc(m.title)}</div>
      <div class="prob-row"><span class="prob-label yes">JA</span><div class="prob-track"><div class="prob-fill yes" style="width:${m.yes_pct}%"></div></div><span class="prob-pct">${m.yes_pct}%</span></div>
      <div class="prob-row"><span class="prob-label no">NEE</span><div class="prob-track"><div class="prob-fill no" style="width:${m.no_pct}%"></div></div><span class="prob-pct">${m.no_pct}%</span></div>
      <div class="mcard-footer"><span class="pot">Pot: <span class="pot-val">${fmt(m.total_pot)} ${CURRENCY}</span></span><span class="bet-count">${m.bet_count} inzet${m.bet_count!==1?'ten':''}</span></div>

  const isResolved = m.status==='resolved';
  const canBet = m.status==='open';
  const showResolve = canResolve(m) && !isResolved;
  const badgeCls = isResolved?'b-resolved':(CAT_CLASS[m.category]||'b-overig');
  const badgeText = isResolved?(m.outcome==='yes'?'✓ JA':'✗ NEE'):m.category;
  const statusText = isResolved?'Afgerond':m.status==='closed'?'Gesloten':fmtDate(m.closing_date);
  const statusLabel = isResolved?'Status':m.status==='closed'?'Status':'Sluitingsdatum';

  const outcomeBanner = isResolved ? '<div class="outcome-banner '+m.outcome+'">'+(m.outcome==='yes'?'Geresolveerd als JA ✓':'Geresolveerd als NEE ✗')+'</div>' : '';

  const betsHtml = m.bets.length > 0 ? m.bets.map(b => {
    const c=avtColor(b.user_name);

        <button class="side-btn yes ${betSide==='yes'?'on':''}" onclick="betSide='yes';render()">JA — ${m.yes_pct}%</button>
        <button class="side-btn no ${betSide==='no'?'on':''}" onclick="betSide='no';render()">NEE — ${m.no_pct}%</button>
      </div>
      <div class="input-label">Bedrag (${CURRENCY})</div>

  const msgHtml = betMsg ? '<div class="bet-message '+betMsg.type+'">'+esc(betMsg.text)+'</div>' : '';
  const adminHtml = showResolve ? `<div class="admin-section"><div class="admin-title">Weddenschap resolveren</div><div class="admin-row"><button class="resolve-btn yes" onclick="confirmResolve('yes')">Resolveert JA</button><button class="resolve-btn no" onclick="confirmResolve('no')">Resolveert NEE</button></div></div>` : '';

/* ===== LEADERBOARD ===== */
function renderLeaderboard() {
  // Show all 13 names — active users with real balance, inactive greyed out
  const activeMap = {};
  allUsers.forEach(u => { activeMap[u.name] = u; });

  const rows = ALL_NAMES.map(name => {
    const active = activeMap[name];
    return {
      name,
      balance: active ? Math.round(active.balance*100)/100 : START_BALANCE,
      profit: active ? Math.round((active.balance-START_BALANCE)*100)/100 : 0,
      active: !!active,
    };
  }).sort((a,b) => {
    if (a.active && !b.active) return -1;
    if (!a.active && b.active) return 1;
    return b.balance - a.balance;
  });

  const rowsHtml = rows.map((u,i) => {
    const c=avtColor(u.name);
    const pSign=u.profit>0?'+':'';
    const pClass=u.profit>0?'pos':u.profit<0?'neg':'zero';
    const rankHtml=i===0&&u.active?'<svg width="16" height="16" viewBox="0 0 24 24" fill="#BA7517"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>':(i+1);
    return `<div class="lb-row ${i===0&&u.active?'first':''} ${u.active?'':'lb-inactive'}">
      <div class="lb-rank">${rankHtml}</div>
      <div class="lb-avatar" style="background:${c.bg};color:${c.fg}">${ini(u.name)}</div>
      <div class="lb-name">${u.name}${u.active?'':' <span class="lb-status">nog niet actief</span>'}</div>
      <div class="lb-right">
        <div class="lb-balance">${fmt(u.balance)} ${CURRENCY}</div>
        ${u.active?'<div class="lb-pnl '+pClass+'">'+pSign+fmt(u.profit)+' '+CURRENCY+'</div>':''}
      </div>
    </div>`;
  }).join('');

  return `<div class="section-header"><span class="section-title">Klassement</span><span class="section-meta">Startbedrag: ${fmt(START_BALANCE)} ${CURRENCY}</span></div><div class="lb-card">${rowsHtml}</div>`;
}

function renderTimeline() {
  const topLevel = messages.filter(m => !m.reply_to);
  const getReplies = (pid) => messages.filter(m => m.reply_to === pid).sort((a,b) => (a.created_at||'').localeCompare(b.created_at||''));

  const postBoxHtml = `
    <div class="post-box">
      <div class="post-box-top">
        <div class="tweet-avatar" style="background:${avtColor(currentUser.name).bg};color:${avtColor(currentUser.name).fg}">${ini(currentUser.name)}</div>
        <textarea id="postInput" placeholder="Wat speelt er in de Zoelloe-groep?" maxlength="500" oninput="updateCharCount()"></textarea>
      </div>
      <div class="post-box-bottom">
        <span class="post-counter" id="postCounter">0 / 500</span>
        <button class="post-btn" onclick="doPostMessage()">Plaatsen</button>
      </div>
    </div>
  `;

  const tweetHtml = (m) => {
    const c = avtColor(m.user_name);
    const likeCount = (m.liked_by || []).length;
    const liked = (m.liked_by || []).includes(currentUser.uid);
    const canDelete = m.user_uid === currentUser.uid || isAdmin();
    const replies = getReplies(m.id);
    const replyBox = replyingTo === m.id ? `
      <div class="reply-box">
        <textarea id="replyInput-${m.id}" placeholder="Schrijf een reactie..." maxlength="500"></textarea>
        <div class="reply-box-actions">
          <button class="cancel" onclick="replyingTo=null;render()">Annuleren</button>
          <button class="send" onclick="doReply('${m.id}')">Plaatsen</button>
        </div>
      </div>` : '';
    const repliesHtml = replies.length > 0 ? `
      <div class="replies">
        ${replies.map(r => {
          const rc = avtColor(r.user_name);
          const rLiked = (r.liked_by || []).includes(currentUser.uid);
          const rLikes = (r.liked_by || []).length;
          const rCanDel = r.user_uid === currentUser.uid || isAdmin();
          return `<div class="reply">
            <div class="tweet-head">
              <div class="tweet-avatar" style="width:28px;height:28px;font-size:10px;background:${rc.bg};color:${rc.fg}">${ini(r.user_name)}</div>
              <div class="tweet-body">
                <div class="tweet-meta">
                  <span class="tweet-name">${esc(r.user_name)}</span>
                  <span class="tweet-time">· ${fmtRelTime(r.created_at)}</span>
                </div>
                <div class="tweet-text">${esc(r.text)}</div>
                <div class="tweet-actions">
                  <button class="tweet-action ${rLiked?'liked':''}" onclick="doLikeMessage('${r.id}')">
                    ${rLiked?'♥':'♡'} ${rLikes||''}
                  </button>
                  ${rCanDel?`<button class="tweet-action del" onclick="doDeleteMessage('${r.id}')">🗑</button>`:''}
                </div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>` : '';
    return `<div class="tweet">
      <div class="tweet-head">
        <div class="tweet-avatar" style="background:${c.bg};color:${c.fg}">${ini(m.user_name)}</div>
        <div class="tweet-body">
          <div class="tweet-meta">
            <span class="tweet-name">${esc(m.user_name)}</span>
            <span class="tweet-time">· ${fmtRelTime(m.created_at)}</span>
          </div>
          <div class="tweet-text">${esc(m.text)}</div>
          <div class="tweet-actions">
            <button class="tweet-action" onclick="startReply('${m.id}')">💬 ${replies.length||''}</button>
            <button class="tweet-action ${liked?'liked':''}" onclick="doLikeMessage('${m.id}')">
              ${liked?'♥':'♡'} ${likeCount||''}
            </button>
            ${canDelete?`<button class="tweet-action del" onclick="doDeleteMessage('${m.id}')">🗑</button>`:''}
          </div>
          ${replyBox}
          ${repliesHtml}
        </div>
      </div>
    </div>`;
  };

  const msgBanner = timelineMsg ? `<div class="bet-message ${timelineMsg.type}">${esc(timelineMsg.text)}</div>` : '';

  const tweetsHtml = topLevel.length === 0
    ? '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Nog geen berichten</div><div class="empty-text">Wees de eerste die iets post in de Zoelloe-tijdlijn.</div></div>'
    : topLevel.map(tweetHtml).join('');

      ${tweetsHtml}

function updateCharCount() {
  const input = document.getElementById('postInput');
  const counter = document.getElementById('postCounter');
  if (input && counter) {
    const len = input.value.length;
    counter.textContent = len + ' / 500';
    counter.className = 'post-counter' + (len > 500 ? ' over' : '');
  }
}

  else if (sub === 'countries') inner = renderScoCountries();
  else if (sub === 'ranking') inner = renderScoRanking();
  else if (sub === 'admin' && isAdmin()) inner = renderScoAdmin();

  return `<div class="scorito-view" data-phase="${activePhase}">
    ${heroHtml}
    ${subtabsHtml}
    ${msgBanner}
    ${inner}
  </div>`;
}

function renderScoPhaseSelector(activePhase) {
  return `<div class="sc-phase-selector">
    ${SC_PHASES.map(p => {
      const locked = scPhaseLocked(p.id);
      return `<button class="sc-phase-chip ${activePhase===p.id?'on':''} ${locked?'locked':''}" onclick="setScPhase('${p.id}')">${p.short}${locked?'<span class="lock">🔒</span>':''}</button>`;
    }).join('')}
  </div>`;
}

function renderScoMatches() {
  const phaseId = scoritoPhase;
  const phase = scPhase(phaseId);
  const matchesInPhase = scMatchesForPhase(phaseId);
  const locked = scPhaseLocked(phaseId);
  const dl = scTournament?.deadlines?.[phaseId];
  const relDl = scFmtRelDeadline(dl);
  const openCount = matchesInPhase.filter(m => m.status !== 'finished').length;

  const groupsInPhase = phaseId === 'group'
    ? [...new Set(matchesInPhase.map(m => m.group).filter(Boolean))].sort()
    : null;

  const infoHtml = `<div class="sc-phase-info">
    <b>${phase.name}</b> — ${phase.toto} pnt bij juiste winnaar, <b>${phase.exact}</b> pnt bij exacte uitslag.
    ${dl ? `<br>⏰ Deadline: ${scFmtDateTime(dl)} (${relDl})` : ''}
    ${locked ? ' — <b style="color:#A32D2D">gesloten</b>' : ''}
  </div>`;

  if (matchesInPhase.length === 0) {
    return renderScoPhaseSelector(phaseId) + infoHtml +
      '<div class="empty-state"><div class="empty-icon">⚽</div><div class="empty-title">Nog geen wedstrijden</div><div class="empty-text">Coen kan via admin wedstrijden toevoegen voor deze fase.</div></div>';
  }

  const matchCardHtml = (m) => {
    const myPred = scMyPrediction(m.id);
    const draft = scDraftPredictions[m.id] || { home: myPred?.pred_home ?? '', away: myPred?.pred_away ?? '' };
    const canEdit = !locked && m.status !== 'finished';
    const isFin = m.status === 'finished';
    const statusLabel = m.status === 'live' ? 'LIVE' : m.status === 'finished' ? 'KLAAR' : 'GEPLAND';

    let scoreBlock;
    if (isFin) {
      scoreBlock = `<div class="sc-result">${m.score_home} - ${m.score_away}</div>`;
    } else {
      scoreBlock = `<div class="sc-score-input">
        <input id="sc-h-${m.id}" type="number" min="0" max="20" inputmode="numeric" value="${draft.home!==''&&draft.home!=null?draft.home:''}"
               ${canEdit?'':'disabled'}
               oninput="scDraftPredictions['${m.id}']=scDraftPredictions['${m.id}']||{};scDraftPredictions['${m.id}'].home=this.value;scDraftPredictions['${m.id}'].away=document.getElementById('sc-a-${m.id}').value;scMarkUnsaved('matches');document.getElementById('sc-unsaved-matches')?.classList.add('show');">
        <span class="sc-score-sep">-</span>
        <input id="sc-a-${m.id}" type="number" min="0" max="20" inputmode="numeric" value="${draft.away!==''&&draft.away!=null?draft.away:''}"
               ${canEdit?'':'disabled'}
               oninput="scDraftPredictions['${m.id}']=scDraftPredictions['${m.id}']||{};scDraftPredictions['${m.id}'].away=this.value;scDraftPredictions['${m.id}'].home=document.getElementById('sc-h-${m.id}').value;scMarkUnsaved('matches');document.getElementById('sc-unsaved-matches')?.classList.add('show');">
      </div>`;
    }

    let predInfo = '';
    if (myPred) {
      if (isFin) {
        const r = scMatchPoints(myPred, m);
        const badge = r?.type === 'exact' ? '<span class="sc-pred-points exact">+'+r.pts+' exact</span>'
                    : r?.type === 'toto'  ? '<span class="sc-pred-points toto">+'+r.pts+' toto</span>'
                    : '<span class="sc-pred-points none">0</span>';
        predInfo = `<div class="sc-prediction-info"><span>Jouw gok: <span class="sc-pred-score">${myPred.pred_home}-${myPred.pred_away}</span></span>${badge}</div>`;
      } else {
        predInfo = `<div class="sc-prediction-info"><span>Jouw gok: <span class="sc-pred-score">${myPred.pred_home}-${myPred.pred_away}</span></span><span style="font-size:10px;color:#aaa">opgeslagen</span></div>`;
      }
    }

    return `<div class="sc-match">
      <div class="sc-match-top">
        <span class="sc-match-date">${scFmtDateTime(m.kickoff)}${m.group?' · Groep '+m.group:''}</span>
        <span class="sc-match-status ${m.status||'scheduled'}">${statusLabel}</span>
      </div>
      <div class="sc-match-teams">
        <div class="sc-team home">
          <span class="sc-team-name">${esc(scName(m.team_home))}</span>
          <span class="sc-flag">${scFlag(m.team_home)}</span>
        </div>
        ${scoreBlock}
        <div class="sc-team away">
          <span class="sc-flag">${scFlag(m.team_away)}</span>
          <span class="sc-team-name">${esc(scName(m.team_away))}</span>
        </div>
      </div>
      ${predInfo}
    </div>`;
  };

  let matchesHtml;
  if (groupsInPhase && groupsInPhase.length > 0) {
    matchesHtml = groupsInPhase.map(g => {
      const gm = matchesInPhase.filter(m => m.group === g);
      return `<div class="sc-match-group">
        <div class="sc-match-group-title">Groep ${g}</div>
        ${gm.map(matchCardHtml).join('')}
      </div>`;
    }).join('');
  } else {
    matchesHtml = matchesInPhase.map(matchCardHtml).join('');
  }

  // Progress-indicator: hoeveel wedstrijden hebben al een voorspelling (opgeslagen of draft)?
  const filledCount = matchesInPhase.filter(m => {
    const d = scDraftPredictions[m.id];
    if (d && d.home !== '' && d.home != null && d.away !== '' && d.away != null) return true;
    const p = scMyPrediction(m.id);
    return !!p;
  }).length;
  const total = matchesInPhase.length;
  const pct = total ? Math.round(filledCount/total*100) : 0;
  const progressHtml = total > 0 ? `<div class="sc-progress">
      <div class="sc-progress-label"><span>Ingevuld: <b>${filledCount}/${total}</b></span><span>${pct}%</span></div>
      <div class="sc-progress-bar"><div class="sc-progress-fill" style="width:${pct}%"></div></div>
    </div>` : '';

  const unsavedBadge = `<span id="sc-unsaved-matches" class="sc-unsaved-badge ${scUnsaved.matches?'show':''}">⚠️ Niet opgeslagen</span>`;
  const saveBar = !locked && openCount > 0 ? `
    <div class="sc-save-bar">
      <div class="sc-save-bar-info">
        <span>${openCount} open wedstrijd${openCount!==1?'en':''} · <b>${phase.name}</b></span>
        ${unsavedBadge}
      </div>
      <button class="sc-save-btn" onclick="doSavePredictions('${phaseId}')">💾 Opslaan</button>
    </div>
  ` : '';

  return renderScoPhaseSelector(phaseId) + infoHtml + progressHtml + matchesHtml + saveBar;
}

function renderScoTopscorers() {
  const phaseId = scoritoPhase;
  const phase = scPhase(phaseId);
  const locked = scPhaseLocked(phaseId);
  const dl = scTournament?.deadlines?.[phaseId];

  // Initialiseer draft uit bestaande pick
  if (scDraftTopscorers.length === 0) {
    const existing = scMyTopscorerPick(phaseId);
    if (existing && existing.player_ids) {
      scDraftTopscorers = existing.player_ids.slice();
    }
  }

  const infoHtml = `<div class="sc-phase-info">
    <b>Topscorers ${phase.name}</b> — kies 4 spelers. Verdienen per doelpunt:
    <b>${phase.scorer.GK}pnt</b> (GK/DEF) · <b>${phase.scorer.MID}pnt</b> (MID) · <b>${phase.scorer.FWD}pnt</b> (FWD)
    ${dl ? `<br>⏰ Deadline: ${scFmtDateTime(dl)}` : ''}
    ${locked ? ' — <b style="color:#A32D2D">gesloten</b>' : ''}
  </div>`;

  const posFilterHtml = `<div class="sc-pos-filter">
    <button class="chip ${scPosFilter===''?'on':''}" onclick="scPosFilter='';render()">Alle</button>
    ${SC_POSITIONS.map(p => `<button class="chip ${scPosFilter===p.id?'on':''}" onclick="scPosFilter='${p.id}';render()">${p.name}</button>`).join('')}
  </div>`;

  const filtered = scPosFilter ? scPlayers.filter(p => p.pos === scPosFilter) : scPlayers;
  const sorted = filtered.slice().sort((a,b) => {
    const posOrder = { GK:1, DEF:2, MID:3, FWD:4 };
    if (posOrder[a.pos] !== posOrder[b.pos]) return posOrder[a.pos] - posOrder[b.pos];
    return (a.name||'').localeCompare(b.name||'');
  });

  const playersHtml = sorted.map(p => {
    const picked = scDraftTopscorers.includes(p.id);
    const totalGoals = Object.values(p.goals_by_phase || {}).reduce((s,n) => s + (n||0), 0);
    return `<div class="sc-player ${picked?'picked':''}" onclick="${locked?'':'toggleTopscorer(\''+p.id+'\')'}">
      <span class="sc-player-flag">${scFlag(p.team)}</span>
      <div class="sc-player-body">
        <div class="sc-player-name">${esc(p.name)}</div>
        <div class="sc-player-meta">
          <span class="sc-pos-badge ${p.pos}">${p.pos}</span>
          <span>${scName(p.team)}</span>
          <span class="sc-player-goals">· <b>${totalGoals}</b>g</span>
        </div>
      </div>
      ${picked?'<span class="sc-player-check">✓</span>':''}
    </div>`;
  }).join('');

  const count = scDraftTopscorers.length;

  const unsavedTS = scUnsaved.topscorers ? '<span class="sc-unsaved-badge show" style="margin-left:8px">⚠️ Niet opgeslagen</span>' : '';
  return renderScoPhaseSelector(phaseId) + infoHtml + `
    <div class="sc-picker-header">
      <span class="sc-picker-count ${count===4?'full':''}">Gekozen: ${count} / 4</span>${unsavedTS}
      <button class="sc-save-btn" ${locked||count!==4?'disabled':''} onclick="doSaveTopscorers('${phaseId}')">💾 Topscorers opslaan</button>
    </div>
    ${posFilterHtml}
    <div class="sc-player-list">${playersHtml || '<div class="empty-state"><div class="empty-text">Geen spelers in deze filter.</div></div>'}</div>
  `;
}

function renderScoCountries() {
  const dl = scTournament?.countries_deadline;
  const locked = dl && new Date() > new Date(dl);
  const existing = scMyCountryPred();

  // Init draft
  if (!scDraftCountry) {
    scDraftCountry = {
      groups: existing?.groups ? {...existing.groups} : {},
      to_qf: existing?.to_qf ? existing.to_qf.slice() : [],
      to_sf: existing?.to_sf ? existing.to_sf.slice() : [],
      to_final: existing?.to_final ? existing.to_final.slice() : [],
      champion: existing?.champion || null
    };
  }

  const infoHtml = `<div class="sc-phase-info">
    <b>Landenvoorspellingen</b> — één keer invullen vóór start toernooi.
    ${dl ? `<br>⏰ Deadline: ${scFmtDateTime(dl)} (${scFmtRelDeadline(dl)})` : ''}
    ${locked ? ' — <b style="color:#A32D2D">gesloten</b>' : ''}
    <br><b>Punten:</b> 50 door groep, 75 juiste positie, 30 naar 1/4, 60 naar 1/2, 120 naar finale, <b>250 voor kampioen</b>.
  </div>`;

  const allGroupCountries = Object.entries(SC_GROUPS);

  const groupsHtml = `<div class="sc-country-section">
    <div class="sc-country-section-title">🏁 Groepsfase — wie gaat er door en op welke plek?</div>
    <div class="sc-country-section-sub">Vink aan wie volgens jou doorgaat. Kies ook positie (1e/2e) voor bonus.</div>
    <div class="sc-groups-grid">
      ${allGroupCountries.map(([g, teams]) => `
        <div class="sc-group-box">
          <div class="sc-group-box-title">Groep ${g}</div>
          ${teams.map(code => {
            const info = scDraftCountry.groups[code] || { through:false, position:null };
            return `<div class="sc-group-country">
              <input type="checkbox" ${info.through?'checked':''} ${locked?'disabled':''}
                onchange="scDraftCountry.groups['${code}']={...scDraftCountry.groups['${code}'],through:this.checked};scMarkUnsaved('country');render()">
              <span class="sc-flag" style="font-size:16px">${scFlag(code)}</span>
              <span>${esc(scName(code))}</span>
              <select class="sc-pos-select" ${locked?'disabled':''}
                onchange="scDraftCountry.groups['${code}']={...scDraftCountry.groups['${code}'],position:this.value?parseInt(this.value):null};scMarkUnsaved('country');render()">
                <option value="">—</option>
                <option value="1" ${info.position===1?'selected':''}>1e</option>
                <option value="2" ${info.position===2?'selected':''}>2e</option>
              </select>
            </div>`;
          }).join('')}
        </div>
      `).join('')}
    </div>
  </div>`;

  // KO-rondes: multiselect
  const allCountries = Object.keys(SC_COUNTRIES).sort((a,b) => scName(a).localeCompare(scName(b)));
  const koSection = (key, title, sub, limit) => {
    const picked = scDraftCountry[key] || [];
    return `<div class="sc-country-section">
      <div class="sc-country-section-title">${title}</div>
      <div class="sc-country-section-sub">${sub} (${picked.length}/${limit})</div>
      <div class="sc-groups-grid">
        ${Object.entries(SC_GROUPS).map(([g, teams]) => `
          <div class="sc-group-box">
            <div class="sc-group-box-title">Groep ${g}</div>
            ${teams.map(code => {
              const on = picked.includes(code);
              return `<div class="sc-group-country">
                <input type="checkbox" ${on?'checked':''} ${locked?'disabled':''}
                  onchange="toggleKoCountry('${key}','${code}',${limit})">
                <span class="sc-flag" style="font-size:16px">${scFlag(code)}</span>
                <span>${esc(scName(code))}</span>
              </div>`;
            }).join('')}
          </div>
        `).join('')}
      </div>
    </div>`;
  };

  const championHtml = `<div class="sc-country-section sc-champion-pick">
    <div class="sc-country-section-title">🏆 Wereldkampioen (250 punten!)</div>
    <div class="sc-country-section-sub">Je belangrijkste voorspelling.</div>
    <select class="sc-ko-select" ${locked?'disabled':''} onchange="scDraftCountry.champion=this.value||null;scMarkUnsaved('country');render()" style="font-size:14px;padding:10px">
      <option value="">— Kies kampioen —</option>
      ${allCountries.map(c => `<option value="${c}" ${scDraftCountry.champion===c?'selected':''}>${scFlag(c)} ${scName(c)}</option>`).join('')}
    </select>
  </div>`;

  const statusText = scUnsaved.country
    ? '<span class="sc-unsaved-badge show">⚠️ Niet opgeslagen</span>'
    : existing ? '<span style="color:#7c7">✓ Voorspelling opgeslagen</span>' : '<span style="color:#aaa">Nog niets opgeslagen</span>';
  const saveBtn = locked ? '' : `
    <div class="sc-save-bar">
      <span class="sc-save-bar-info">${statusText}</span>
      <button class="sc-save-btn" onclick="doSaveCountryPredictions()">💾 Opslaan</button>
    </div>
  `;

  return infoHtml + groupsHtml
    + koSection('to_qf', '🎯 Naar de kwartfinale', '8 landen (30 pnt elk)', 8)
    + koSection('to_sf', '🎯 Naar de halve finale', '4 landen (60 pnt elk)', 4)
    + koSection('to_final', '🎯 Naar de finale', '2 landen (120 pnt elk)', 2)
    + championHtml + saveBtn;
}

function toggleKoCountry(key, code, limit) {
  const arr = scDraftCountry[key] || [];
  const idx = arr.indexOf(code);
  if (idx >= 0) { arr.splice(idx, 1); }
  else {
    if (arr.length >= limit) {
      scoritoMsg = { type:'error', text:'Max '+limit+' landen in deze ronde. Verwijder er eerst een.' };
      render(); return;
    }
    arr.push(code);
  }
  scDraftCountry[key] = arr;
  scMarkUnsaved('country');
  scoritoMsg = null;
  render();
}

      total: mp + tp + cp

      <div class="sc-rank-sub col-hide-mob">${fmt(r.countries)}</div>
      <div class="sc-rank-points">${fmt(r.total)}</div>
    </div>`;
  }).join('');

  return `
    <div class="sc-phase-info" style="background:#E1F5EE;border-color:#9ad2bd;color:#085041">
      <b>Totale Scorito-ranglijst</b> — sommatie van wedstrijdpunten, topscorers en landenvoorspellingen.
    </div>
    <div class="lb-card">
      <div class="sc-rank-row sc-rank-head">
        <div>#</div>
        <div></div>
        <div>Naam</div>
        <div class="sc-rank-sub col-hide-mob">Matches</div>
        <div class="sc-rank-sub col-hide-mob">Toppers</div>
        <div class="sc-rank-sub col-hide-mob">Landen</div>
        <div class="sc-rank-points">Totaal</div>
      </div>
      ${rowsHtml}

}

    <div class="sc-admin-section">
      <div class="sc-admin-title">⚽ Doelpunten in ${phase.name}</div>
      <div class="sc-admin-hint">Vul per speler in hoeveel doelpunten hij in deze fase maakte. Punten worden automatisch berekend: GK/DEF ${phase.scorer.GK}, MID ${phase.scorer.MID}, FWD ${phase.scorer.FWD}.</div>
      ${sortedPlayers.map(p => {
        const g = p.goals_by_phase?.[phaseId] ?? 0;
        return `<div class="sc-admin-row">
          <span style="flex:1;min-width:200px;font-size:12px"><span class="sc-pos-badge ${p.pos}">${p.pos}</span> ${scFlag(p.team)} <b>${esc(p.name)}</b></span>
          <input class="sc-admin-input" id="adm-goals-${p.id}-${phaseId}" type="number" min="0" style="width:60px" value="${g}">
          <span style="font-size:11px;color:#888">goals</span>
          <button class="sc-admin-btn" onclick="adminSavePlayerGoals('${p.id}','${phaseId}')">Opslaan</button>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderAdmPlayers() {
  const newForm = `<div class="sc-admin-section">
    <div class="sc-admin-title">➕ Nieuwe speler</div>
    <div class="sc-admin-row">
      <input class="sc-admin-input" id="adm-new-player-name" placeholder="Naam" style="flex:1;min-width:160px">
      <select class="sc-admin-input" id="adm-new-player-team">
        <option value="">— Land —</option>
        ${Object.keys(SC_COUNTRIES).sort((a,b)=>scName(a).localeCompare(scName(b))).map(c => `<option value="${c}">${scFlag(c)} ${scName(c)}</option>`).join('')}
      </select>
      <select class="sc-admin-input" id="adm-new-player-pos">
        <option value="">— Positie —</option>
        ${SC_POSITIONS.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
      </select>
      <button class="sc-admin-btn" onclick="adminAddPlayer()">Toevoegen</button>
    </div>
  </div>`;

  return newForm + `
    <div class="sc-admin-section">
      <div class="sc-admin-title">👤 Spelerslijst (${scPlayers.length})</div>
      <div class="sc-admin-hint">Verwijder een speler die niet (meer) in de selectie zit. Topscorer-picks die deze speler hebben tellen dan 0 punten.</div>
      ${scPlayers.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(p => `<div class="sc-admin-row">
        <span style="flex:1"><span class="sc-pos-badge ${p.pos}">${p.pos}</span> ${scFlag(p.team)} ${esc(p.name)}</span>
        <button class="sc-admin-btn danger" onclick="adminDeletePlayer('${p.id}')">🗑</button>
      </div>`).join('')}
    </div>
  `;
}

function renderAdmCountries() {
  const results = scTournament?.country_results || {};
  const allCountries = [...new Set(Object.values(SC_GROUPS).flat())];
  const sorted = allCountries.slice().sort((a,b) => scName(a).localeCompare(scName(b)));

  const koSelect = (key, title, limit) => {
    const picked = scTournament?.[key] || [];
    return `<div class="sc-admin-section">
      <div class="sc-admin-title">${title} (${picked.length}/${limit})</div>
      <select multiple id="adm-ko-${key}" class="sc-admin-input" style="width:100%;min-height:140px">
        ${sorted.map(c => `<option value="${c}" ${picked.includes(c)?'selected':''}>${scFlag(c)} ${scName(c)}</option>`).join('')}
      </select>
      <div style="margin-top:8px"><button class="sc-admin-btn" onclick="adminSetKoCountries('${key}')">Opslaan</button></div>
    </div>`;
  };

  return `
    <div class="sc-admin-section">
      <div class="sc-admin-title">🏁 Uit groepsfase: wie is door en op welke plek?</div>
      <div class="sc-admin-hint">Vink aan welke landen doorgaan. Positie 1 of 2 voor bonuspunten.</div>
      ${sorted.map(c => {
        const r = results[c] || { through_group: false, group_position: null };
        return `<div class="sc-admin-row">
          <span style="flex:1;min-width:160px">${scFlag(c)} ${scName(c)}</span>
          <label style="font-size:11px;display:flex;align-items:center;gap:4px">
            <input type="checkbox" id="adm-cntry-through-${c}" ${r.through_group?'checked':''}> Door
          </label>
          <select class="sc-admin-input" id="adm-cntry-pos-${c}">
            <option value="" ${!r.group_position?'selected':''}>—</option>
            <option value="1" ${r.group_position===1?'selected':''}>1e</option>
            <option value="2" ${r.group_position===2?'selected':''}>2e</option>
          </select>
          <button class="sc-admin-btn" onclick="adminSaveCountryResult('${c}')">Opslaan</button>
        </div>`;
      }).join('')}
    </div>
    ${koSelect('to_qf','🎯 Landen in kwartfinale',8)}
    ${koSelect('to_sf','🎯 Landen in halve finale',4)}
    ${koSelect('to_final','🎯 Landen in finale',2)}
    <div class="sc-admin-section sc-champion-pick">
      <div class="sc-admin-title">🏆 Wereldkampioen</div>
      <select id="adm-champion" class="sc-admin-input" style="font-size:14px;padding:8px;width:100%">
        <option value="">— nog niet bekend —</option>
        ${sorted.map(c => `<option value="${c}" ${scTournament?.champion===c?'selected':''}>${scFlag(c)} ${scName(c)}</option>`).join('')}
      </select>
      <div style="margin-top:8px"><button class="sc-admin-btn" onclick="adminSetChampion()">Kampioen opslaan</button></div>
    </div>
  `;
}

function renderAdmDeadlines() {
  const deadlines = scTournament?.deadlines || {};
  const toLocal = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };

  return `<div class="sc-admin-section">
    <div class="sc-admin-title">⏰ Deadlines per fase</div>
    <div class="sc-admin-hint">Na de deadline kunnen spelers geen voorspellingen meer aanpassen.</div>
    ${SC_PHASES.map(p => `<div class="sc-admin-row">
      <span style="flex:1;min-width:140px">${p.name}</span>
      <input class="sc-admin-input" id="adm-dl-${p.id}" type="datetime-local" value="${toLocal(deadlines[p.id])}">
      <button class="sc-admin-btn" onclick="adminSetDeadline('${p.id}')">Opslaan</button>
    </div>`).join('')}
    <div class="sc-admin-row" style="border-top:2px solid #f0eeea;margin-top:10px;padding-top:14px">
      <span style="flex:1;min-width:140px"><b>Landen-deadline</b> (eenmalig, voor start)</span>
      <input class="sc-admin-input" id="adm-dl-countries" type="datetime-local" value="${toLocal(scTournament?.countries_deadline)}">
      <button class="sc-admin-btn" onclick="adminSetCountriesDeadline()">Opslaan</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════ */
function goView(v) {
  // Waarschuwing bij verlaten scorito met unsaved changes
  if (view === 'scorito' && v !== 'scorito' && scHasAnyUnsaved()) {
    if (!confirm('Je hebt niet-opgeslagen wijzigingen in Scorito.\n\nWeet je zeker dat je weg wilt navigeren? Niet-opgeslagen invoer gaat verloren.')) {
      return;
    }
  }
  view = v;
  betMsg = null;
  formError = '';
  if (v !== 'detail') selectedMarketId = null;
  // Reset scorito draft state bij wegnavigeren
  if (v !== 'scorito') {
    scDraftPredictions = {};
    scDraftTopscorers = [];
    scDraftCountry = null;
    scoritoMsg = null;
    scUnsaved = { matches:false, topscorers:false, country:false };
  }
  // Reset tijdlijn reply bij wegnavigeren
  if (v !== 'tijdlijn') {
    replyingTo = null;
    timelineMsg = null;
  }
  render();
  window.scrollTo(0, 0);
}
function openMarket(id) { selectedMarketId=id; view='detail'; betSide='yes'; betMsg=null; render(); window.scrollTo(0,0); }
function setCatFilter(c) { catFilter=c; render(); }

function goScoritoSub(sub) {
  // Waarschuwing als je sub-tab wisselt met niet-opgeslagen wijzigingen
  const curKey = scoritoSubview === 'matches' ? 'matches'
               : scoritoSubview === 'topscorers' ? 'topscorers'
               : scoritoSubview === 'countries' ? 'country' : null;
  if (curKey && scUnsaved[curKey] && sub !== scoritoSubview) {
    if (!confirm('Je hebt niet-opgeslagen wijzigingen in dit onderdeel.\n\nDoorgaan zonder opslaan?')) {
      return;
    }
    if (curKey === 'matches')    { scDraftPredictions = {}; scUnsaved.matches = false; }
    if (curKey === 'topscorers') { scDraftTopscorers = []; scUnsaved.topscorers = false; }
    if (curKey === 'country')    { scDraftCountry = null;  scUnsaved.country = false; }
  }
  scoritoSubview = sub;
  scoritoMsg = null;
  // Pre-fill topscorer draft (alleen als niet al bewerkt)
  if (!scUnsaved.topscorers) {
    const existing = scMyTopscorerPick(scoritoPhase);
    scDraftTopscorers = existing?.player_ids ? existing.player_ids.slice() : [];
  }
  // Pre-fill country draft (alleen als niet al bewerkt)
  if (!scUnsaved.country) {
    const myCountry = scCountryPreds.find(c => c.user_uid === currentUser?.uid);
    scDraftCountry = myCountry ? {
      groups: myCountry.groups ? Object.assign({}, myCountry.groups) : {},
      to_qf: (myCountry.to_qf||[]).slice(),
      to_sf: (myCountry.to_sf||[]).slice(),
      to_final: (myCountry.to_final||[]).slice(),
      champion: myCountry.champion || null
    } : null;
  }
  render();
  window.scrollTo(0, 0);
}

function setScPhase(phaseId) {
  if (scUnsaved.matches || scUnsaved.topscorers) {
    if (!confirm('Niet-opgeslagen voorspellingen in deze fase.\n\nDoorgaan naar andere fase zonder opslaan?')) {
      return;
    }
  }
  scoritoPhase = phaseId;
  scDraftPredictions = {};
  scUnsaved.matches = false;
  const existing = scMyTopscorerPick(phaseId);
  scDraftTopscorers = existing?.player_ids ? existing.player_ids.slice() : [];
  scUnsaved.topscorers = false;
  scoritoMsg = null;
  render();
}

function setScPosFilter(p) { scPosFilter = p; render(); }
function setScAdminTab(t) { scAdminTab = t; render(); }

function confirmResolve(outcome) {
  const label=outcome==='yes'?'JA':'NEE';
  const color=outcome==='yes'?'#3B6D11':'#A32D2D';
  const btnClass=outcome==='yes'?'confirm-yes':'confirm-no';
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=()=>overlay.remove();
  overlay.innerHTML=`<div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">Weddenschap resolveren?</div>
    <div class="modal-text">Je resolveert deze markt als <b style="color:${color}">${label}</b>.<br>Dit kan niet ongedaan worden. Diesel Dollars worden direct uitgekeerd.</div>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="this.closest('.modal-overlay').remove()">Annuleren</button>
      <button class="modal-btn ${btnClass}" onclick="doResolve('${outcome}')">Bevestigen — ${label}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
